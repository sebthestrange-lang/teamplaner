<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      lang="de">
<head><title>Serverfehler</title></head>
<body>
<main layout:fragment="content">
    <div class="empty-state" style="padding: 5rem 0">
        <div style="font-size:5rem; color:#ef4444">500</div>
        <h2 class="mt-2">Serverfehler</h2>
        <p class="text-muted" th:text="${fehler ?: 'Ein unerwarteter Fehler ist aufgetreten.'}"></p>
        <a th:href="@{/}" class="btn btn-primary mt-2">Zum Dashboard</a>
    </div>
</main>
</body>
</html>
