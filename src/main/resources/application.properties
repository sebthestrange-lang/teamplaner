# Server
server.port=8080

# H2 Datenbank (dateibasiert)
spring.datasource.url=jdbc:h2:file:./data/teamplaner;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA – Hibernate validiert nur, Flyway verwaltet das Schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# H2 Console (nur Dev-Profil – via application-dev.properties aktiviert)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Logging
logging.level.de.teamplaner=DEBUG
logging.level.org.flywaydb=INFO

# E-Mail (SMTP) – nur aktiv wenn spring.mail.host gesetzt ist
# spring.mail.host=smtp.example.com
# spring.mail.port=587
# spring.mail.username=user@example.com
# spring.mail.password=secret
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=noreply@teamplaner.de
