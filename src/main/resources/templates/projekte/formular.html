<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      lang="de">
<head><title th:text="${aktion}">Projekt</title></head>
<body>
<main layout:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/projekte}">Projekte</a></li>
            <li class="breadcrumb-item active" th:text="${aktion}"></li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card card-custom">
                <div class="card-header-custom">
                    <h5 class="mb-0" th:text="${aktion}"></h5>
                </div>
                <div class="card-body">
                    <form th:action="${projekt.id != null} ? @{/projekte/{id}(id=${projekt.id})} : @{/projekte}"
                          th:object="${projekt}" method="post">

                        <div class="mb-3">
                            <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
                            <input type="text" id="name" th:field="*{name}"
                                   th:class="'form-control' + (${#fields.hasErrors('name')} ? ' is-invalid' : '')"
                                   placeholder="Projektname">
                            <div th:if="${#fields.hasErrors('name')}" class="invalid-feedback"
                                 th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="beschreibung" class="form-label">Beschreibung</label>
                            <textarea id="beschreibung" th:field="*{beschreibung}"
                                      class="form-control" rows="3"
                                      placeholder="Kurze Projektbeschreibung..."></textarea>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-sm-6">
                                <label for="status" class="form-label">Status <span class="text-danger">*</span></label>
                                <select id="status" th:field="*{status}"
                                        th:class="'form-select' + (${#fields.hasErrors('status')} ? ' is-invalid' : '')">
                                    <option th:each="s : ${projektStatus}" th:value="${s.name()}"
                                            th:text="${s.bezeichnung}"></option>
                                </select>
                            </div>
                            <div class="col-sm-6">
                                <label for="team" class="form-label">Team</label>
                                <select id="team" th:field="*{team}" class="form-select">
                                    <option value="">Kein Team</option>
                                    <option th:each="t : ${teams}" th:value="${t.id}"
                                            th:text="${t.name}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-sm-6">
                                <label for="faelligAm" class="form-label">Fällig am</label>
                                <input type="date" id="faelligAm" th:field="*{faelligAm}"
                                       class="form-control">
                            </div>
                            <div class="col-sm-6">
                                <label for="farbe" class="form-label">Projektfarbe</label>
                                <div class="d-flex gap-2 align-items-center">
                                    <input type="color" id="farbe" th:field="*{farbe}"
                                           class="form-control form-control-color"
                                           style="width:60px; height:38px">
                                    <span class="text-muted small">Klicken zum Auswählen</span>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>Speichern
                            </button>
                            <a th:href="@{/projekte}" class="btn btn-light">Abbrechen</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</main>
</body>
</html>
