<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      lang="de">
<head><title th:text="${aufgabe.titel}">Aufgabe</title></head>
<body>
<main layout:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Dashboard</a></li>
            <li class="breadcrumb-item"><a th:href="@{/aufgaben}">Aufgaben</a></li>
            <li class="breadcrumb-item active" th:text="${aufgabe.titel}"></li>
        </ol>
    </nav>

    <div class="page-header mb-4 d-flex justify-content-between align-items-start">
        <div class="me-2">
            <div class="d-flex align-items-center flex-wrap gap-2 mb-1 page-title-group">
                <h1 class="page-title mb-0" th:text="${aufgabe.titel}"></h1>
                <span th:class="'badge rounded-pill bg-' + ${aufgabe.prioritaet.bootstrapKlasse}"
                      th:text="${aufgabe.prioritaet.bezeichnung}"></span>
                <span th:class="'badge rounded-pill bg-' + ${aufgabe.status.bootstrapKlasse}"
                      th:text="${aufgabe.status.bezeichnung}"></span>
            </div>
            <p th:if="${aufgabe.beschreibung}" class="text-muted" th:text="${aufgabe.beschreibung}"></p>
        </div>
        <div class="d-flex gap-2 flex-shrink-0">
            <a th:href="@{/aufgaben/{id}/bearbeiten(id=${aufgabe.id})}" class="btn btn-outline-primary">
                <i class="bi bi-pencil"></i><span class="d-none d-sm-inline ms-1">Bearbeiten</span>
            </a>
            <button type="button" class="btn btn-outline-danger"
                    th:onclick="'loeschenBestaetigen(\'/aufgaben/' + ${aufgabe.id} + '/loeschen\')'">
                <i class="bi bi-trash"></i>
            </button>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card card-custom mb-4">
                <div class="card-header-custom">
                    <h5 class="mb-0"><i class="bi bi-info-circle me-2"></i>Details</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <small class="text-muted d-block">Projekt</small>
                        <span th:if="${aufgabe.projekt}">
                            <a th:href="@{/projekte/{id}(id=${aufgabe.projekt.id})}"
                               th:text="${aufgabe.projekt.name}"
                               class="text-decoration-none"></a>
                        </span>
                        <span th:unless="${aufgabe.projekt}" class="text-muted">—</span>
                    </div>
                    <div class="mb-3">
                        <small class="text-muted d-block">Mitarbeiter</small>
                        <span th:if="${aufgabe.mitarbeiter}">
                            <a th:href="@{/mitarbeiter/{id}(id=${aufgabe.mitarbeiter.id})}"
                               th:text="${aufgabe.mitarbeiter.vollstaendigerName}"
                               class="text-decoration-none"></a>
                        </span>
                        <span th:unless="${aufgabe.mitarbeiter}" class="text-muted">—</span>
                    </div>
                    <div class="mb-3">
                        <small class="text-muted d-block">Fällig am</small>
                        <span th:if="${aufgabe.faelligAm}"
                              th:text="${#temporals.format(aufgabe.faelligAm, 'dd.MM.yyyy')}"></span>
                        <span th:unless="${aufgabe.faelligAm}" class="text-muted">—</span>
                    </div>
                    <div class="mb-3">
                        <small class="text-muted d-block">Erstellt am</small>
                        <span th:text="${#temporals.format(aufgabe.erstelltAm, 'dd.MM.yyyy HH:mm')}"></span>
                    </div>
                    <div th:if="${aufgabe.abgeschlossenAm}" class="mb-3">
                        <small class="text-muted d-block">Abgeschlossen am</small>
                        <span th:text="${#temporals.format(aufgabe.abgeschlossenAm, 'dd.MM.yyyy HH:mm')}"></span>
                    </div>
                    <div th:if="${!aufgabe.tags.isEmpty()}">
                        <small class="text-muted d-block mb-1">Tags</small>
                        <div class="d-flex gap-1 flex-wrap">
                            <span th:each="tag : ${aufgabe.tags}"
                                  class="badge rounded-pill"
                                  th:style="'background-color:' + ${tag.farbe} + '22; color:' + ${tag.farbe}"
                                  th:text="${tag.name}"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Abhängigkeiten -->
            <div class="card card-custom">
                <div class="card-header-custom d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-diagram-3 me-2"></i>Abhängigkeiten</h5>
                </div>
                <div class="card-body">
                    <div th:if="${aufgabe.hatOffeneBlocker()}"
                         class="alert alert-warning small py-2 mb-3">
                        <i class="bi bi-exclamation-triangle me-1"></i>
                        Diese Aufgabe hat noch offene Blocker.
                    </div>
                    <div th:if="${aufgabe.blockiertVon.isEmpty()}" class="text-muted small">
                        Keine Abhängigkeiten
                    </div>
                    <ul th:unless="${aufgabe.blockiertVon.isEmpty()}" class="list-unstyled mb-3">
                        <li th:each="blocker : ${aufgabe.blockiertVon}"
                            class="d-flex align-items-center gap-2 mb-2">
                            <i th:class="'bi ' + (${blocker.status.name() == 'ABGESCHLOSSEN'} ? 'bi-check-circle-fill text-success' : 'bi-circle text-warning')"></i>
                            <a th:href="@{/aufgaben/{id}(id=${blocker.id})}"
                               th:text="${blocker.titel}"
                               class="text-decoration-none small flex-grow-1 text-truncate"></a>
                            <form th:action="@{/aufgaben/{id}/abhaengigkeit/{bId}/loeschen(id=${aufgabe.id},bId=${blocker.id})}"
                                  method="post" class="d-inline" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                                <button type="submit" class="btn btn-xs btn-outline-danger">
                                    <i class="bi bi-x"></i>
                                </button>
                            </form>
                        </li>
                    </ul>
                    <form th:action="@{/aufgaben/{id}/abhaengigkeit(id=${aufgabe.id})}"
                          method="post" class="d-flex gap-2" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <select name="blockiertVonId" class="form-select form-select-sm">
                            <option value="">Blocker auswählen...</option>
                            <option th:each="a : ${alleAufgaben}"
                                    th:value="${a.id}"
                                    th:text="${a.titel}"
                                    th:disabled="${aufgabe.blockiertVon.contains(a)}"></option>
                        </select>
                        <button type="submit" class="btn btn-sm btn-outline-secondary text-nowrap">
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card card-custom mb-4">
                <div class="card-header-custom">
                    <h5 class="mb-0"><i class="bi bi-arrow-repeat me-2"></i>Status ändern</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/aufgaben/{id}/status(id=${aufgabe.id})}" method="post"
                          class="d-flex gap-2 flex-wrap">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" name="status" value="OFFEN"
                                th:class="'btn btn-sm ' + (${aufgabe.status.name() == 'OFFEN'} ? 'btn-secondary' : 'btn-outline-secondary')">
                            Offen
                        </button>
                        <button type="submit" name="status" value="IN_BEARBEITUNG"
                                th:class="'btn btn-sm ' + (${aufgabe.status.name() == 'IN_BEARBEITUNG'} ? 'btn-primary' : 'btn-outline-primary')">
                            In Bearbeitung
                        </button>
                        <button type="submit" name="status" value="ABGESCHLOSSEN"
                                th:class="'btn btn-sm ' + (${aufgabe.status.name() == 'ABGESCHLOSSEN'} ? 'btn-success' : 'btn-outline-success')">
                            Abgeschlossen
                        </button>
                    </form>
                </div>
            </div>

            <!-- Kommentare -->
            <div class="card card-custom">
                <div class="card-header-custom">
                    <h5 class="mb-0"><i class="bi bi-chat-left-text me-2"></i>Kommentare</h5>
                </div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(kommentare)}" class="text-muted small mb-3">
                        Noch keine Kommentare.
                    </div>
                    <div th:each="k : ${kommentare}" class="d-flex gap-3 mb-3">
                        <div class="avatar-sm flex-shrink-0"
                             style="background-color: #6366f1"
                             th:text="${k.benutzer.anzeigename.substring(0,1).toUpperCase()}"></div>
                        <div class="flex-grow-1">
                            <div class="d-flex align-items-center gap-2 mb-1">
                                <span class="fw-semibold small" th:text="${k.benutzer.anzeigename}"></span>
                                <span class="text-muted" style="font-size:.75rem"
                                      th:text="${#temporals.format(k.erstelltAm, 'dd.MM.yyyy HH:mm')}"></span>
                                <form th:action="@{/aufgaben/{id}/kommentar/{kId}/loeschen(id=${aufgabe.id},kId=${k.id})}"
                                      method="post" class="ms-auto" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                                    <button type="submit" class="btn btn-xs btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                            <p class="mb-0 small" style="white-space: pre-wrap" th:text="${k.inhalt}"></p>
                        </div>
                    </div>

                    <form th:action="@{/aufgaben/{id}/kommentar(id=${aufgabe.id})}"
                          method="post" class="mt-3" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <textarea name="inhalt" class="form-control form-control-sm mb-2" rows="3"
                                  placeholder="Kommentar schreiben..." required maxlength="2000"></textarea>
                        <button type="submit" class="btn btn-sm btn-primary">
                            <i class="bi bi-send me-1"></i>Absenden
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</main>
</body>
</html>
