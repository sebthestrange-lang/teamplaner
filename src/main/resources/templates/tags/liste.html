<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      lang="de">
<head><title>Tags</title></head>
<body>
<main layout:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Dashboard</a></li>
            <li class="breadcrumb-item active">Tags</li>
        </ol>
    </nav>

    <div class="page-header mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h1 class="page-title">Tags</h1>
            <p class="text-muted mb-0" th:text="${#lists.size(tags)} + ' Tags'"></p>
        </div>
        <a th:href="@{/tags/neu}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Neuer Tag
        </a>
    </div>

    <div th:if="${#lists.isEmpty(tags)}" class="empty-state card-custom">
        <i class="bi bi-tag text-muted" style="font-size:3rem"></i>
        <h5 class="mt-3 text-muted">Noch keine Tags vorhanden</h5>
        <a th:href="@{/tags/neu}" class="btn btn-primary mt-2">Tag anlegen</a>
    </div>

    <div th:unless="${#lists.isEmpty(tags)}" class="card card-custom">
        <div th:each="tag : ${tags}" class="d-flex align-items-center gap-3 px-4 py-3 border-bottom">
            <span class="badge rounded-pill px-3 py-2"
                  th:style="'background-color:' + ${tag.farbe} + '22; color:' + ${tag.farbe}"
                  th:text="${tag.name}"></span>
            <span class="text-muted small" th:text="${tag.farbe}"></span>
            <div class="ms-auto d-flex gap-2">
                <a th:href="@{/tags/{id}/bearbeiten(id=${tag.id})}" class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-pencil"></i>
                </a>
                <button type="button" class="btn btn-sm btn-outline-danger"
                        th:onclick="'loeschenBestaetigen(\'/tags/' + ${tag.id} + '/loeschen\')'">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
        </div>
    </div>

</main>
</body>
</html>
