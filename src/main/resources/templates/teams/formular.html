<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      lang="de">
<head><title th:text="${aktion}">Team</title></head>
<body>
<main layout:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Dashboard</a></li>
            <li class="breadcrumb-item"><a th:href="@{/teams}">Teams</a></li>
            <li class="breadcrumb-item active" th:text="${aktion}"></li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card card-custom">
                <div class="card-header-custom">
                    <h5 class="mb-0" th:text="${aktion}"></h5>
                </div>
                <div class="card-body">
                    <form th:action="${team.id != null} ? @{/teams/{id}(id=${team.id})} : @{/teams}"
                          th:object="${team}" method="post">

                        <div class="mb-3">
                            <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
                            <input type="text" id="name" th:field="*{name}"
                                   th:class="'form-control' + (${#fields.hasErrors('name')} ? ' is-invalid' : '')"
                                   placeholder="z.B. Backend-Team" autofocus>
                            <div th:if="${#fields.hasErrors('name')}" class="invalid-feedback"
                                 th:errors="*{name}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="farbe" class="form-label">Teamfarbe</label>
                            <div class="d-flex gap-3 align-items-center">
                                <input type="color" id="farbe" th:field="*{farbe}"
                                       class="form-control form-control-color"
                                       style="width:60px; height:38px">
                                <span class="text-muted small">Klicken zum Auswählen</span>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>Speichern
                            </button>
                            <a th:href="@{/teams}" class="btn btn-light">Abbrechen</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</main>
</body>
</html>
