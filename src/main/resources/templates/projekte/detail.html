<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      lang="de">
<head><title th:text="${projekt.name}">Projekt</title></head>
<body>
<main layout:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Dashboard</a></li>
            <li class="breadcrumb-item"><a th:href="@{/projekte}">Projekte</a></li>
            <li class="breadcrumb-item active" th:text="${projekt.name}"></li>
        </ol>
    </nav>

    <!-- Header -->
    <div class="page-header mb-4 d-flex justify-content-between align-items-start">
        <div>
            <div class="d-flex align-items-center gap-2 mb-1">
                <h1 class="page-title mb-0" th:text="${projekt.name}"></h1>
                <span th:class="'badge rounded-pill bg-' + ${projekt.status.bootstrapKlasse}"
                      th:text="${projekt.status.bezeichnung}"></span>
            </div>
            <p th:if="${projekt.beschreibung}" class="text-muted mb-1" th:text="${projekt.beschreibung}"></p>
            <div class="d-flex gap-3 small text-muted">
                <span th:if="${projekt.team}">
                    <i class="bi bi-people me-1"></i>
                    <a th:href="@{/teams/{id}(id=${projekt.team.id})}"
                       th:text="${projekt.team.name}"
                       class="text-decoration-none text-muted"></a>
                </span>
                <span th:if="${projekt.faelligAm}">
                    <i class="bi bi-calendar3 me-1"></i>
                    Fällig: <span th:text="${#temporals.format(projekt.faelligAm, 'dd.MM.yyyy')}"></span>
                </span>
            </div>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/aufgaben/neu(projektId=${projekt.id})}" class="btn btn-outline-success">
                <i class="bi bi-plus-lg me-1"></i>Aufgabe
            </a>
            <a th:href="@{/projekte/{id}/bearbeiten(id=${projekt.id})}" class="btn btn-outline-primary">
                <i class="bi bi-pencil me-1"></i>Bearbeiten
            </a>
            <button type="button" class="btn btn-outline-danger"
                    th:onclick="'loeschenBestaetigen(\'/projekte/' + ${projekt.id} + '/loeschen\')'">
                <i class="bi bi-trash"></i>
            </button>
        </div>
    </div>

    <!-- Fortschritt -->
    <div class="card card-custom mb-4">
        <div class="card-body py-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="fw-medium">Fortschritt</span>
                <span class="text-muted small"
                      th:text="${erledigteAufgaben} + ' von ' + ${gesamtAufgaben} + ' Aufgaben erledigt'"></span>
            </div>
            <div class="progress" style="height:10px">
                <div class="progress-bar bg-success" role="progressbar"
                     th:style="'width:' + ${fortschritt} + '%'"
                     th:attr="aria-valuenow=${fortschritt}"
                     aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <div class="text-end mt-1">
                <small class="text-muted fw-semibold" th:text="${fortschritt} + '%'"></small>
            </div>
        </div>
    </div>

    <div class="row g-4">

        <!-- Beteiligte Mitarbeiter -->
        <div class="col-lg-5">
            <div class="card card-custom">
                <div class="card-header-custom">
                    <h5 class="mb-0"><i class="bi bi-person-badge-fill me-2"></i>Beteiligte Mitarbeiter</h5>
                </div>
                <div th:if="${#lists.isEmpty(beteiligte)}" class="empty-state py-4">
                    <p class="text-muted mb-0">Noch keine Aufgaben zugewiesen</p>
                </div>
                <div th:unless="${#lists.isEmpty(beteiligte)}" class="p-3">
                    <div th:each="ma : ${beteiligte}" class="d-flex align-items-center gap-3 mb-3">
                        <div class="avatar flex-shrink-0"
                             th:style="'background-color:' + ${ma.team?.farbe ?: '#6366f1'}"
                             th:text="${ma.initialen}"></div>
                        <div class="flex-grow-1">
                            <div class="fw-medium small">
                                <a th:href="@{/mitarbeiter/{id}(id=${ma.id})}"
                                   th:text="${ma.vollstaendigerName}"
                                   class="text-decoration-none text-dark"></a>
                            </div>
                            <div class="d-flex gap-2 mt-1">
                                <span class="badge bg-warning-soft text-warning small"
                                      th:text="${aufgabenStatistik[ma.id]?.get('offen') ?: 0} + ' offen'"></span>
                                <span class="badge bg-success-soft text-success small"
                                      th:text="${aufgabenStatistik[ma.id]?.get('erledigt') ?: 0} + ' erledigt'"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Aufgabenliste -->
        <div class="col-lg-7">
            <div class="card card-custom">
                <div class="card-header-custom d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-check2-square me-2"></i>Aufgaben</h5>
                    <a th:href="@{/aufgaben/neu(projektId=${projekt.id})}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-plus-lg me-1"></i>Neue Aufgabe
                    </a>
                </div>
                <div th:if="${#lists.isEmpty(aufgaben)}" class="empty-state py-4">
                    <p class="text-muted mb-0">Noch keine Aufgaben in diesem Projekt</p>
                </div>
                <div th:unless="${#lists.isEmpty(aufgaben)}" class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Aufgabe</th>
                            <th>Priorität</th>
                            <th>Mitarbeiter</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="aufgabe : ${aufgaben}"
                            th:class="${aufgabe.faelligAm != null and aufgabe.faelligAm.isBefore(#temporals.createToday()) and aufgabe.status.name() != 'ABGESCHLOSSEN'} ? 'table-danger' : ''">
                            <td class="fw-medium">
                                <a th:href="@{/aufgaben/{id}(id=${aufgabe.id})}"
                                   th:text="${aufgabe.titel}"
                                   class="text-decoration-none text-dark"></a>
                            </td>
                            <td>
                                <span th:class="'badge rounded-pill bg-' + ${aufgabe.prioritaet.bootstrapKlasse}"
                                      th:text="${aufgabe.prioritaet.bezeichnung}"></span>
                            </td>
                            <td>
                                <span th:if="${aufgabe.mitarbeiter}" class="d-flex align-items-center gap-1">
                                    <span class="avatar-xs"
                                          th:style="'background-color:' + ${aufgabe.mitarbeiter.team?.farbe ?: '#6366f1'}"
                                          th:text="${aufgabe.mitarbeiter.initialen}"></span>
                                    <span class="small" th:text="${aufgabe.mitarbeiter.vollstaendigerName}"></span>
                                </span>
                                <span th:unless="${aufgabe.mitarbeiter}" class="text-muted">—</span>
                            </td>
                            <td>
                                <span th:class="'badge rounded-pill bg-' + ${aufgabe.status.bootstrapKlasse}"
                                      th:text="${aufgabe.status.bezeichnung}"></span>
                            </td>
                        </tr>
                    </tbody>
                </table>
                </div>
            </div>
        </div>

    </div>
</main>
</body>
</html>
